name: Metrics

on:
  schedule:
    - cron: '0 6 * * *'   # todo dia às 06:00 UTC (~03:00 horário de Brasília)
  workflow_dispatch:       # permite rodar manualmente em Actions > Metrics > Run workflow
  push:
    branches: [main]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICAS_COMMITS }}
          user: Comin92
          template: classic
          base: header, activity, community, repositories, metadata
          plugin_lines: yes
          plugin_lines_repositories_visibility: public, private
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          config_timezone: America/Sao_Paulo
          filename: github-metrics.svg
